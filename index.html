<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

      name="viewport"

    />

    <script src="https://cdn.tailwindcss.com"></script>
    <link

    />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
      body {
        font-family: 'Outfit', sans-serif;
        scroll-behavior: smooth;
        overflow-x: hidden; /* Evita scroll lateral molesto */
      }
      .tab-active {
        border-bottom: 4px solid #10b981;
        color: #10b981;
      }
      .correct {
        background-color: #065f46 !important;
        border-color: #059669 !important;
        color: white !important;
      }
      .incorrect {
        background-color: #7f1d1d !important;
        border-color: #dc2626 !important;
        color: white !important;
      }
      .explanation-box {
        animation: slideIn 0.3s ease-out;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .card-zoom:hover {
        transform: scale(1.01);
      }
      .user-active {
        background-color: #10b981 !important;
        color: #020617 !important;
        border-color: #10b981 !important;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-200 min-h-screen">
    <nav

    >
      <div
        class="container mx-auto px-4 flex justify-between items-center h-16"
      >
        <div class="flex items-center gap-2 md:gap-4">

            <div

            >
              <i class="fas fa-user-md text-slate-950 text-base md:text-xl"></i>
            </div>
            <span

          </div>

          <div
            class="flex bg-slate-950 rounded-xl p-1 border border-slate-700 shadow-inner scale-90 md:scale-100"
          >
            <button

            >
              ARI
            </button>
            <button

              GEE
            </button>
          </div>
        </div>

        <div
          class="flex gap-2 md:gap-6 text-[9px] md:text-xs font-bold uppercase tracking-widest overflow-x-auto"
        >
          <button
            onclick="showTab('all')"
            id="btn-all"
            class="tab-active py-5 transition-all text-white whitespace-nowrap"
          >
            Banco
          </button>
          <button
            onclick="showTab('themes')"
            id="btn-themes"
            class="py-5 transition-all text-white whitespace-nowrap"
          >
            Temas
          </button>
          <button
            onclick="showTab('sim')"

          >
            Test
          </button>

            class="py-5 transition-all text-orange-400 font-bold uppercase whitespace-nowrap text-[10px] md:text-xs"

    <main class="container mx-auto px-4 py-6 md:py-8 max-w-5xl">
      <section id="view-all">

          <div class="relative w-full md:w-80">
            <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>

              class="bg-slate-900 border border-slate-700 rounded-2xl pl-12 pr-5 py-3 w-full focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm"
            />
          </div>
        </div>
        <div id="full-list" class="space-y-4 md:space-y-6"></div>
      </section>

      <section id="view-themes" class="hidden">
        <h2
          class="text-2xl md:text-3xl font-black text-white mb-8 uppercase italic text-center"
        >
          Temario Oficial
        </h2>
        <div
          id="theme-grid"
          class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4 mb-12"
        ></div>
        <div
          id="theme-questions"
          class="space-y-4 md:space-y-6 scroll-mt-24"
        ></div>
      </section>

      <section id="view-sim" class="hidden max-w-2xl mx-auto">
        <div

        >
          <i

          ></i>
          <h2 class="text-3xl md:text-4xl font-black text-white mb-6 italic">
            Examen Random
          </h2>
          <button
            onclick="startSim()"
            class="bg-emerald-500 text-slate-950 font-black px-8 md:px-12 py-4 md:py-5 rounded-2xl shadow-lg w-full sm:w-auto text-sm md:text-base"
          >
            COMENZAR (20 PREG.)
          </button>
        </div>
        <div id="sim-engine" class="hidden">
          <div
            id="sim-num-display"
            class="mb-4 text-emerald-500 font-black uppercase tracking-tighter text-center"
          ></div>
          <div id="sim-question-container"></div>
          <div class="flex justify-between mt-8 items-center">
            <button
              onclick="stopSim()"
              class="text-slate-500 font-bold uppercase text-xs"
            >
              Abandonar
            </button>
            <button
              id="btn-next"
              onclick="nextSimQuestion()"
              class="hidden bg-emerald-500 text-slate-950 px-8 py-3 rounded-xl font-bold text-sm"
            >
              SIGUIENTE <i class="fas fa-arrow-right ml-2"></i>
            </button>
          </div>
        </div>
        <div
          id="sim-results"
          class="hidden text-center py-16 bg-slate-900 rounded-[2rem] md:rounded-[3rem]"
        >
          <h2 class="text-2xl md:text-3xl font-black text-white mb-6 uppercase">
            Resultado
          </h2>
          <div
            id="final-score"
            class="text-6xl md:text-7xl font-black text-emerald-500 mb-8"
          ></div>
          <button
            onclick="startSim()"
            class="bg-emerald-500 text-slate-950 font-black px-10 py-4 rounded-xl"
          >
            Reintentar
          </button>
        </div>
      </section>

      <section id="view-errors" class="hidden">

          <div>
            <h2 class="text-3xl font-black text-white italic">

              <span id="error-user-name" class="text-orange-500"></span>
            </h2>
            <p class="text-slate-400 text-sm">

          </button>
        </div>
        <div id="error-list" class="space-y-4 md:space-y-6"></div>
      </section>
    </main>

      // LÓGICA DE USUARIOS
      let currentUser = localStorage.getItem('fisioUserActive') || 'ARI'
      let userErrors = []

      function loadUserData() {
        userErrors =
          JSON.parse(localStorage.getItem(`errors_${currentUser}`)) || []
        document.getElementById('welcome-text').innerText =
          `Usuario: ${currentUser}`
        document.getElementById('error-user-name').innerText = currentUser
        document
          .getElementById('user-ari-btn')
          .classList.toggle('user-active', currentUser === 'ARI')
        document
          .getElementById('user-gee-btn')
          .classList.toggle('user-active', currentUser === 'GEE')
      }

      function switchUser(userName) {
        currentUser = userName
        localStorage.setItem('fisioUserActive', userName)
        loadUserData()
        if (
          !document.getElementById('view-errors').classList.contains('hidden')
        )
          renderErrors()
        if (!document.getElementById('view-all').classList.contains('hidden'))
          renderFullList()
      }

      function saveError(qId) {
        if (!userErrors.includes(qId)) {
          userErrors.push(qId)
          localStorage.setItem(
            `errors_${currentUser}`,
            JSON.stringify(userErrors)
          )
        }
      }

      function removeFromErrors(qId) {
        userErrors = userErrors.filter((id) => id !== qId)
        localStorage.setItem(
          `errors_${currentUser}`,
          JSON.stringify(userErrors)
        )
        renderErrors()
      }

      function clearErrorHistory() {
        if (confirm(`¿Vaciar los errores de ${currentUser}?`)) {
          userErrors = []
          localStorage.setItem(
            `errors_${currentUser}`,
            JSON.stringify(userErrors)
          )
          renderErrors()
        }
      }

      // GENERADOR DE TARJETAS (Ajustado para móvil)
      function createQuestionCard(q, isSim = false, isErrorView = false) {
        return `
          <div class="bg-slate-900 border border-slate-800 p-5 md:p-8 rounded-[1.5rem] md:rounded-[2rem] space-y-4 md:space-y-6 shadow-xl card-zoom transition-all relative">
            ${isErrorView ? `<button onclick="removeFromErrors(${q.id})" class="absolute top-4 right-4 text-orange-500 text-[9px] font-black uppercase bg-orange-500/10 px-2 py-1 rounded-lg">Borrar <i class="fas fa-trash ml-1"></i></button>` : ''}
            <div class="flex justify-between items-center text-[9px] font-black uppercase tracking-widest">
              <span class="text-emerald-500">${q.theme}</span>
              <span class="text-slate-600">ID #${q.id}</span>
            </div>
            <h3 class="text-lg md:text-xl font-bold leading-tight text-white pr-10">${q.q}</h3>
            <div class="grid grid-cols-1 gap-3">
              ${q.options
                .map(
                  (opt, i) => `
                <button onclick="handleResponse(this, ${i}, ${q.id}, ${isSim})" 
                  class="opt-btn text-left p-4 rounded-xl bg-slate-800/40 border border-slate-700 hover:border-emerald-500/50 transition-all flex gap-3 group">
                  <span class="bg-slate-950 w-6 h-6 rounded-md flex items-center justify-center text-emerald-500 font-black shrink-0 text-xs">${String.fromCharCode(65 + i)}</span>
                  <span class="text-xs md:text-sm font-medium leading-tight flex-1">${opt}</span>
                </button>
              `
                )
                .join('')}
            </div>
            <div class="explanation hidden bg-emerald-500/5 text-emerald-300 p-4 md:p-6 rounded-xl border border-emerald-500/10 text-xs md:text-sm italic explanation-box flex gap-3">
              <i class="fas fa-info-circle text-emerald-500 mt-1"></i>
              <div class="explanation-text"></div>
            </div>
          </div>`
      }

      function handleResponse(btn, selectedIdx, qId, isSim) {
        const qData = database.find((item) => item.id === qId)
        const container = btn.closest('.bg-slate-900')
        const allBtns = container.querySelectorAll('.opt-btn')
        const explanationDiv = container.querySelector('.explanation')
        const explanationText = container.querySelector('.explanation-text')
        allBtns.forEach((b) => (b.disabled = true))
        if (selectedIdx === qData.correct) {
          btn.classList.add('correct')
          if (isSim) score++
        } else {
          btn.classList.add('incorrect')
          allBtns[qData.correct].classList.add('correct')
          saveError(qId)
        }
        explanationText.innerHTML = `<strong>EXPLICACIÓN:</strong> ${qData.reason}`
        explanationDiv.classList.remove('hidden')
        if (isSim)
          document.getElementById('btn-next').classList.remove('hidden')
      }

      function showTab(tab) {
        document
          .querySelectorAll('section')
          .forEach((s) => s.classList.add('hidden'))
        document
          .querySelectorAll('nav button')
          .forEach((b) => b.classList.remove('tab-active'))
        document.getElementById(`view-${tab}`).classList.remove('hidden')
        document.getElementById(`btn-${tab}`).classList.add('tab-active')
        if (tab === 'all') renderFullList()
        if (tab === 'themes') renderThemeGrid()
        if (tab === 'errors') renderErrors()
      }

      function renderThemeGrid() {
        const counts = {}
        database.forEach((q) => {
          counts[q.theme] = (counts[q.theme] || 0) + 1
        })
        const themes = Object.keys(counts).sort()
        document.getElementById('theme-grid').innerHTML = themes
          .map(
            (t) => `
          <button onclick="filterByTheme('${t}')" class="bg-slate-900 border border-slate-800 p-4 md:p-6 rounded-2xl hover:border-emerald-500 text-left transition-all group">
            <i class="fas fa-folder-open text-emerald-500/40 group-hover:text-emerald-500 text-xl mb-3 block"></i>
            <div class="font-bold text-white uppercase text-xs md:text-sm mb-2 h-8 overflow-hidden">${t}</div>
            <div class="text-emerald-500 font-black text-xs">${counts[t]} <span class="text-slate-500 font-normal">preg.</span></div>
          </button>`
          )
          .join('')
      }

      function filterByTheme(theme) {
        const filtered = database.filter((q) => q.theme === theme)
        const container = document.getElementById('theme-questions')
        container.innerHTML = `
            <div class="flex items-center gap-4 py-4">
              <h3 class="text-xl font-black text-white uppercase italic">${theme}</h3>
              <div class="h-px bg-slate-800 flex-1"></div>
            </div>
            ${filtered.map((q) => createQuestionCard(q)).join('')}`

        // CORRECCIÓN CLAVE: Scroll dinámico al contenedor de preguntas
        container.scrollIntoView({ behavior: 'smooth', block: 'start' })
      }

      function renderErrors() {
        const errorList = document.getElementById('error-list')
        if (userErrors.length === 0) {
          errorList.innerHTML = `<div class="text-center py-20 text-slate-500 italic">No tienes fallos guardados. ¡Buen trabajo!</div>`
          return
        }
        const filteredData = database.filter((q) => userErrors.includes(q.id))
        errorList.innerHTML = filteredData
          .map((q) => createQuestionCard(q, false, true))
          .join('')
      }

      function renderFullList() {
        document.getElementById('full-list').innerHTML = database
          .map((q) => createQuestionCard(q))
          .join('')
      }

      function filterAll() {
        const term = document.getElementById('search').value.toLowerCase()
        const filtered = database.filter(
          (q) =>
            q.q.toLowerCase().includes(term) ||
            q.theme.toLowerCase().includes(term)
        )
        document.getElementById('full-list').innerHTML = filtered
          .map((q) => createQuestionCard(q))
          .join('')
      }

      // SIMULADOR
      let simQuestions = []
      let currentSimIdx = 0
      let score = 0
      function startSim() {
        score = 0
        currentSimIdx = 0
        simQuestions = [...database]
          .sort(() => 0.5 - Math.random())
          .slice(0, 20)
        document.getElementById('sim-intro').classList.add('hidden')
        document.getElementById('sim-results').classList.add('hidden')
        document.getElementById('sim-engine').classList.remove('hidden')
        updateSimView()
      }
      function updateSimView() {
        const q = simQuestions[currentSimIdx]
        document.getElementById('sim-num-display').innerText =
          `Pregunta ${currentSimIdx + 1} de 20`
        document.getElementById('sim-question-container').innerHTML =
          createQuestionCard(q, true)
        document.getElementById('btn-next').classList.add('hidden')
        window.scrollTo({ top: 0, behavior: 'smooth' })
      }
      function nextSimQuestion() {
        currentSimIdx++
        if (currentSimIdx < 20) updateSimView()
        else {
          document.getElementById('sim-engine').classList.add('hidden')
          document.getElementById('sim-results').classList.remove('hidden')
          document.getElementById('final-score').innerText = `${score}/20`
        }
      }
      function stopSim() {
        document.getElementById('sim-intro').classList.remove('hidden')
        document.getElementById('sim-engine').classList.add('hidden')
      }

      window.onload = () => {
        loadUserData()
        showTab('all')
      }
    </script>
  </body>
</html>
