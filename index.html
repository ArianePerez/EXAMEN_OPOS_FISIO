// 2. SISTEMA DE CARPETA DE ERRORES (Local Storage)
      let errorFolder = JSON.parse(localStorage.getItem('fisioErrors')) || [];

      function saveError(id) {
        if (!errorFolder.includes(id)) {
          errorFolder.push(id);
          localStorage.setItem('fisioErrors', JSON.stringify(errorFolder));
        }
      }

      function removeFromErrors(id) {
        errorFolder = errorFolder.filter(eId => eId !== id);
        localStorage.setItem('fisioErrors', JSON.stringify(errorFolder));
        renderErrors(); // Refrescar la vista
      }

      function clearErrorHistory() {
        if(confirm("¿Seguro que quieres borrar todas tus preguntas falladas?")) {
            errorFolder = [];
            localStorage.setItem('fisioErrors', JSON.stringify(errorFolder));
            renderErrors();
        }
      }

      // 3. GENERADOR DE TARJETAS
      function createQuestionCard(q, isSim = false, isErrorView = false) {
        return `
          <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] space-y-6 shadow-xl card-zoom transition-all relative">
            ${isErrorView ? `<button onclick="removeFromErrors(${q.id})" class="absolute top-6 right-6 text-red-500 hover:text-white transition-colors text-xs font-bold uppercase bg-red-500/10 px-3 py-1 rounded-lg">Borrar de carpeta <i class="fas fa-times ml-1"></i></button>` : ''}
            <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest">
              <span class="bg-emerald-500/10 text-emerald-500 px-4 py-1.5 rounded-full border border-emerald-500/10">${q.theme}</span>
              <span class="text-slate-600 font-mono">ID #${q.id}</span>
            </div>
            <h3 class="text-xl font-bold leading-tight text-white">${q.q}</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              ${q.options.map((opt, i) => `
                <button onclick="handleResponse(this, ${i}, ${q.id}, ${isSim})" 
                  class="opt-btn text-left p-5 rounded-2xl bg-slate-800/50 border border-slate-700 hover:border-emerald-500/50 transition-all flex gap-4 group">
                  <span class="bg-slate-900 w-8 h-8 rounded-lg flex items-center justify-center text-emerald-500 font-black shrink-0 group-hover:bg-emerald-500 group-hover:text-slate-900 transition-colors">${String.fromCharCode(65 + i)}</span>
                  <span class="text-sm font-medium leading-normal flex-1">${opt}</span>
                </button>
              `).join('')}
            </div>
            <div class="explanation hidden bg-emerald-500/5 text-emerald-300 p-6 rounded-2xl border border-emerald-500/10 text-sm italic explanation-box flex gap-4">
              <i class="fas fa-lightbulb text-emerald-500 mt-1"></i>
              <div class="explanation-text"></div>
            </div>
          </div>`;
      }

      // 4. LÓGICA DE RESPUESTA
      function handleResponse(btn, selectedIdx, qId, isSim) {
        const qData = database.find(item => item.id === qId);
        const container = btn.closest('.bg-slate-900');
        const allBtns = container.querySelectorAll('.opt-btn');
        const explanationDiv = container.querySelector('.explanation');
        const explanationText = container.querySelector('.explanation-text');

        allBtns.forEach(b => b.disabled = true);

        if (selectedIdx === qData.correct) {
          btn.classList.add('correct');
          if (isSim) score++;
        } else {
          btn.classList.add('incorrect');
          allBtns[qData.correct].classList.add('correct');
          // GUARDAR FALLO
          saveError(qId);
        }

        explanationText.innerHTML = `<strong class="uppercase font-black text-emerald-500">Explicación:</strong> ${qData.reason}`;
        explanationDiv.classList.remove('hidden');
        if (isSim) document.getElementById('btn-next').classList.remove('hidden');
      }

      // 5. NAVEGACIÓN Y VISTAS
      function showTab(tab) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
        document.getElementById(`view-${tab}`).classList.remove('hidden');
        document.getElementById(`btn-${tab}`).classList.add('tab-active');
        
        if (tab === 'all') renderFullList();
        if (tab === 'themes') renderThemeGrid();
        if (tab === 'errors') renderErrors();
      }

      function renderErrors() {
        const errorList = document.getElementById('error-list');
        if (errorFolder.length === 0) {
            errorList.innerHTML = `
                <div class="text-center py-20 bg-slate-900 rounded-[3rem] border border-slate-800">
                    <i class="fas fa-check-circle text-6xl text-emerald-500 mb-4"></i>
                    <h3 class="text-2xl font-bold">¡Carpeta limpia!</h3>
                    <p class="text-slate-500 mt-2">No tienes errores acumulados. ¡Sigue estudiando!</p>
                </div>`;
            return;
        }
        const filteredData = database.filter(q => errorFolder.includes(q.id));
        errorList.innerHTML = filteredData.map(q => createQuestionCard(q, false, true)).join('');
      }

      // 6. FUNCIONES DEL BANCO (REUTILIZADAS)
      function renderFullList() {
        document.getElementById('full-list').innerHTML = database.map(q => createQuestionCard(q)).join('');
      }

      function filterAll() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = database.filter(q => q.q.toLowerCase().includes(term) || q.theme.toLowerCase().includes(term));
        document.getElementById('full-list').innerHTML = filtered.map(q => createQuestionCard(q)).join('');
      }

      function renderThemeGrid() {
        const themes = [...new Set(database.map(q => q.theme))];
        document.getElementById('theme-grid').innerHTML = themes.map(t => `
          <button onclick="filterByTheme('${t}')" class="bg-slate-900 border border-slate-800 p-8 rounded-3xl hover:border-emerald-500 text-left transition-all">
            <i class="fas fa-folder text-emerald-500 text-2xl mb-4"></i>
            <div class="font-black text-white uppercase">${t}</div>
          </button>`).join('');
      }

      function filterByTheme(theme) {
        const filtered = database.filter(q => q.theme === theme);
        document.getElementById('theme-questions').innerHTML = filtered.map(q => createQuestionCard(q)).join('');
      }

      // 7. LÓGICA SIMULADOR (SIMPLIFICADA)
      let simQuestions = [];
      let currentSimIdx = 0;
      let score = 0;

      function startSim() {
        score = 0; currentSimIdx = 0;
        simQuestions = [...database].sort(() => 0.5 - Math.random()).slice(0, 20);
        document.getElementById('sim-intro').classList.add('hidden');
        document.getElementById('sim-results').classList.add('hidden');
        document.getElementById('sim-engine').classList.remove('hidden');
        updateSimView();
      }

      function updateSimView() {
        const q = simQuestions[currentSimIdx];
        document.getElementById('sim-num-display').innerText = `Pregunta ${currentSimIdx + 1} de 20`;
        document.getElementById('sim-question-container').innerHTML = createQuestionCard(q, true);
        document.getElementById('btn-next').classList.add('hidden');
      }

      function nextSimQuestion() {
        currentSimIdx++;
        if (currentSimIdx < 20) updateSimView();
        else {
            document.getElementById('sim-engine').classList.add('hidden');
            document.getElementById('sim-results').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score} / 20`;
        }
      }

      function stopSim() {
        document.getElementById('sim-intro').classList.remove('hidden');
        document.getElementById('sim-engine').classList.add('hidden');
      }

      window.onload = () => showTab('all');
    </script>
  </body>
</html>
